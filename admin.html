<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin LLKH - Xuất PDF</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <section class="paper admin-panel">
      <div class="top-note">Khoa Quản trị kinh doanh - Học viện Hàng không Việt Nam</div>
      <h1>QUẢN TRỊ HỒ SƠ LLKH</h1>
      <p class="subtitle">Danh sách giảng viên đã gửi hồ sơ và xuất PDF theo mẫu Lý lịch khoa học</p>

      <div class="admin-toolbar no-print">
        <button type="button" onclick="loadProfiles()">Tải danh sách</button>
        <input id="searchBox" placeholder="Tìm theo họ tên/email/đơn vị" oninput="renderList()" />
      </div>
      <p id="adminStatus" class="err"></p>
      <table id="profileTable">
        <thead>
          <tr><th>Thời gian gửi</th><th>Họ tên</th><th>Email</th><th>Đơn vị</th><th>Tổng bài</th><th>Tổng điểm</th><th></th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
  </main>
  <script src="admin.js"></script>
</body>
</html>
